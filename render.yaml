services:
  - type: web
    name: virusgift-pro
    runtime: node
    repo: https://github.com/yourusername/virusgift-pro
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: virusgift-pro
          type: web
          property: url
    autoDeploy: true
    domains:
      - virusgift.pro
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
    staticPublishPath: public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
